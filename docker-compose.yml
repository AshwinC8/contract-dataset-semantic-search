# Simple setup - just Qdrant (replaces Milvus + etcd + MinIO)
#
# Start with: docker-compose -f docker-compose.simple.yml up -d
#
# This is all you need for the vector database!
# Qdrant is a single container vs Milvus needing 3 containers.

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__LOG_LEVEL=INFO
    restart: unless-stopped
    # Resource limits (adjust based on your data size)
    # For 5 years of data (~1M vectors): 4GB is comfortable
    # For all data (~5M vectors): 8-12GB recommended
    deploy:
      resources:
        limits:
          memory: 4G

volumes:
  qdrant_data:
